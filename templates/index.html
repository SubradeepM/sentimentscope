<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentimentScope - AI Sentiment Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
        }
        
        .search-box {
            background: white;
            border-radius: 60px;
            padding: 10px;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
        }
        
        .search-box button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .search-box button:hover {
            transform: scale(1.02);
        }
        
        .loading {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .card h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .insights-list {
            list-style: none;
        }
        
        .insights-list li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: #555;
        }
        
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .article {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        .article-text {
            margin-bottom: 10px;
            color: #333;
            line-height: 1.5;
        }
        
        .article-source {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 10px;
        }
        
        .sentiment-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 40px;
        }
        
        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
                border-radius: 20px;
            }
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 SentimentScope AI</h1>
        <div class="subtitle">Real-time social media sentiment analysis powered by AI</div>
        
        <div class="search-box">
            <input type="text" id="topic" placeholder="Enter a topic (e.g., AI Technology, Tesla, Cricket...)" onkeypress="if(event.key==='Enter') analyze()">
            <button onclick="analyze()">🔍 Analyze Sentiment</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI is analyzing sentiment across social media...</p>
        </div>
        
        <div class="results" id="results">
            <div class="card">
                <h3>🎯 Overall Sentiment for <span id="topicDisplay"></span></h3>
                <div class="stats" id="stats"></div>
            </div>
            
            <div class="card">
                <h3>🤖 AI Insights & Recommendations</h3>
                <ul class="insights-list" id="insights"></ul>
            </div>
            
            <div class="card">
                <h3>📰 Analyzed Articles</h3>
                <div class="articles-grid" id="articles"></div>
            </div>
        </div>
        
        <footer>
            Powered by AI | Real-time sentiment analysis
        </footer>
    </div>
    
    <script>
        async function analyze() {
            const topic = document.getElementById('topic').value.trim();
            if (!topic) {
                alert('Please enter a topic');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: topic })
                });
                
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayResults(data) {
            document.getElementById('topicDisplay').innerText = data.topic;
            
            const statsHtml = `
                <div class="stat">
                    <div class="stat-number" style="color: #10b981;">${data.overall.positive}</div>
                    <div>Positive Articles</div>
                </div>
                <div class="stat">
                    <div class="stat-number" style="color: #ef4444;">${data.overall.negative}</div>
                    <div>Negative Articles</div>
                </div>
                <div class="stat">
                    <div class="stat-number" style="color: #6b7280;">${data.overall.neutral}</div>
                    <div>Neutral Articles</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;
            
            const insightsHtml = data.insights.map(i => `<li>${i}</li>`).join('');
            document.getElementById('insights').innerHTML = insightsHtml;
            
            const articlesHtml = data.articles.map(a => `
                <div class="article">
                    <div class="article-text">"${a.text}"</div>
                    <div class="article-source">📰 Source: ${a.source}</div>
                    <div class="sentiment-badge" style="background: ${a.color}20; color: ${a.color};">${a.sentiment} (${a.confidence}%)</div>
                </div>
            `).join('');
            document.getElementById('articles').innerHTML = articlesHtml;
            
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
